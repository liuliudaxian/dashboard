/* 顶部标题 */

/* 导航Tab */
.nav-bar {
  display: flex; justify-content: center; background: #0d1b2a;
  border-bottom: 1px solid #1e3a5f; position: sticky; top: 0; z-index: 100;
}
.nav-btn {
  flex: 1; max-width: 180px; padding: 12px 16px; border: none; background: transparent;
  color: #78909c; font-size: 14px; cursor: pointer; transition: all 0.3s;
  border-bottom: 2px solid transparent;
}
.nav-btn:hover { color: #4fc3f7; }
.nav-btn.active { color: #4fc3f7; border-bottom-color: #4fc3f7; background: rgba(79,195,247,0.05); }

/* 筛选栏 */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 10px; padding: 14px 20px;
  background: #111d2e; border-bottom: 1px solid #1e3a5f; align-items: center;
}
.filter-bar label { color: #78909c; font-size: 12px; margin-right: 4px; }
.filter-bar select, .filter-bar input {
  background: #1a2940; border: 1px solid #2a4060; color: #e0e0e0;
  padding: 6px 10px; border-radius: 4px; font-size: 13px; outline: none;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: #4fc3f7; }
.filter-bar input { width: 160px; }
.filter-bar .btn-export {
  background: #2a5a8a; color: #fff; border: none; padding: 6px 14px;
  border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: auto;
}
.filter-bar .btn-export:hover { background: #3a7aba; }

/* 内容区 */
.content { padding: 16px 20px; }

/* 模块面板 */
.panel {
  background: linear-gradient(180deg, #111d2e 0%, #0e1a2b 100%);
  border: 1px solid #1e3a5f; border-radius: 8px; margin-bottom: 16px; overflow: hidden;
}
.panel-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid #1e3a5f;
  background: rgba(79,195,247,0.03);
}
.panel-title { font-size: 15px; font-weight: 600; color: #4fc3f7; }
.panel-header .tab-group { display: flex; gap: 0; }
.panel-header .tab-btn {
  padding: 4px 12px; border: 1px solid #2a4060; background: transparent;
  color: #78909c; font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.panel-header .tab-btn:first-child { border-radius: 4px 0 0 4px; }
.panel-header .tab-btn:last-child { border-radius: 0 4px 4px 0; }
.panel-header .tab-btn.active { background: #2a5a8a; color: #fff; border-color: #2a5a8a; }

/* 表格 */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: #152238; color: #90a4ae; font-weight: 500; padding: 10px 8px;
  border-bottom: 1px solid #1e3a5f; white-space: nowrap; cursor: pointer;
  user-select: none; position: sticky; top: 0; z-index: 1;
}
thead th:hover { color: #4fc3f7; }
thead th .sort-icon { font-size: 10px; margin-left: 2px; }
tbody td {
  padding: 8px; border-bottom: 1px solid rgba(30,58,95,0.5); white-space: nowrap;
}
tbody tr:hover { background: rgba(79,195,247,0.05); }
tbody tr:nth-child(even) { background: rgba(255,255,255,0.01); }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
td.rank { text-align: center; font-weight: 600; color: #4fc3f7; }
td.rank-top3 { color: #ffa726; }
td.positive { color: #66bb6a; }
td.negative { color: #ef5350; }
td.brand-cell { color: #b0bec5; font-weight: 500; }

/* 分页 */
.pagination {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-top: 1px solid #1e3a5f; font-size: 12px; color: #78909c;
}
.pagination .page-btns { display: flex; gap: 4px; }
.pagination .page-btn {
  padding: 4px 10px; border: 1px solid #2a4060; background: transparent;
  color: #90a4ae; border-radius: 3px; cursor: pointer; font-size: 12px;
}
.pagination .page-btn:hover { border-color: #4fc3f7; color: #4fc3f7; }
.pagination .page-btn.active { background: #2a5a8a; color: #fff; border-color: #2a5a8a; }
.pagination select { background: #1a2940; border: 1px solid #2a4060; color: #e0e0e0; padding: 3px 6px; border-radius: 3px; font-size: 12px; }

/* 隐藏 */
.hidden { display: none; }

/* 概览卡片行 */
.summary-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;
}
.summary-card {
  background: linear-gradient(135deg, #111d2e, #162540);
  border: 1px solid #1e3a5f; border-radius: 8px; padding: 14px 16px; text-align: center;

.summary-card .sc-value { font-size: 24px; font-weight: 700; color: #4fc3f7; }
.summary-card .sc-label { font-size: 11px; color: #78909c; margin-top: 4px; }
.summary-card.green .sc-value { color: #66bb6a; }
.summary-card.orange .sc-value { color: #ffa726; }
.summary-card.purple .sc-value { color: #ab47bc; }

/* 两列布局 */
.two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* 响应式 */
@media (max-width: 900px) {
  .nav-btn { font-size: 12px; padding: 10px 6px; max-width: none; }
  .filter-bar { padding: 10px 12px; }
  .filter-bar select, .filter-bar input { font-size: 12px; padding: 5px 8px; }
  .content { padding: 10px; }
  .summary-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .summary-card .sc-value { font-size: 18px; }
  .two-cols { grid-template-columns: 1fr; }
  table { font-size: 12px; }
  thead th, tbody td { padding: 6px 4px; }
  .page-header h1 { font-size: 18px; }

// ==================== 工具函数 ====================
function parsePct(s) {
  if (!s || s === "--") return null;
  return parseFloat(s.replace("%",""));
}

function getPriceRange(priceStr) {
  if (!priceStr) return "";
  var p = parseFloat(priceStr);
  if (isNaN(p)) return "";
  if (p < 8) return "8万以下";
  if (p < 10) return "8-10万";
  if (p < 15) return "10-15万";
  if (p < 20) return "15-20万";
  if (p < 25) return "20-25万";
  if (p < 30) return "25-30万";
  if (p < 50) return "30-50万";
  return "50万以上";
}

function fmtNum(n) {
  if (n == null) return "--";
  return n.toLocaleString("zh-CN");
}

function pctClass(s) {
  if (!s || s === "--") return "";
  return s.startsWith("-") ? "negative" : "positive";
}

function rankClass(r) {
  return r <= 3 ? "rank rank-top3" : "rank";
}

// ==================== 汽车销量数据 ====================
var allPage = 1, allPageSize = 50, allSortKey = "sales", allSortAsc = false;
var allDataCache = [];

function buildAllData() {
  allDataCache = [];
  var modelNameCache = {};
  // 轿车
  sedanData.forEach(function(d){
    var sp = modelSpecs[d.model]||{};
    modelNameCache[d.model] = true;
    allDataCache.push({
      rank:d.rank, cat:"轿车", nation:brandNation[d.brand]||"自主", maker:d.maker,
      brand:d.brand, model:d.model, sales:d.sales, ytd:d.ytd, lastMonth:d.lastMonth,
      mom:d.mom, lastYear:d.lastYear, yoy:d.yoy,
      power:sp.power||"", price:sp.price||"", priceRange:getPriceRange(sp.price||""),
      level:sp.level||"", size:sp.size||"", wb:sp.wb||""
    });
  });
  // SUV
  suvData.forEach(function(d){
    var sp = modelSpecs[d.model]||{};
    modelNameCache[d.model] = true;
    allDataCache.push({
      rank:d.rank, cat:"SUV", nation:brandNation[d.brand]||"自主", maker:d.maker,
      brand:d.brand, model:d.model, sales:d.sales, ytd:d.ytd, lastMonth:d.lastMonth,
      mom:d.mom, lastYear:d.lastYear, yoy:d.yoy,
      power:sp.power||"", price:sp.price||"", priceRange:getPriceRange(sp.price||""),
      level:sp.level||"", size:sp.size||"", wb:sp.wb||""
    });
  });
  // MPV
  mpvData.forEach(function(d){
    var sp = modelSpecs[d.model]||{};
    modelNameCache[d.model] = true;
    allDataCache.push({
      rank:d.rank, cat:"MPV", nation:brandNation[d.brand]||"自主", maker:d.maker,
      brand:d.brand, model:d.model, sales:d.sales, ytd:d.ytd, lastMonth:d.lastMonth,
      mom:d.mom, lastYear:d.lastYear, yoy:d.yoy,
      power:sp.power||"", price:sp.price||"", priceRange:getPriceRange(sp.price||""),
      level:sp.level||"", size:sp.size||"", wb:sp.wb||""
    });
  });
  // 车企明细 (dedup by model name, 根据级别自动归类)
  cqxlExtra.forEach(function(d){
    if (modelNameCache[d.model]) return;
    modelNameCache[d.model] = true;
    var sp = modelSpecs[d.model]||{};
    var autoCat = "轿车";
    if (sp.level && sp.level.indexOf("SUV") >= 0) autoCat = "SUV";
    else if (sp.level && sp.level.indexOf("MPV") >= 0) autoCat = "MPV";
    allDataCache.push({
      rank:0, cat:autoCat, nation:brandNation[d.brand]||"自主", maker:d.maker,
      brand:d.brand, model:d.model, sales:d.sales, ytd:d.ytd, lastMonth:d.lastMonth,
      mom:d.mom, lastYear:d.lastYear, yoy:d.yoy,
      power:sp.power||"", price:sp.price||"", priceRange:getPriceRange(sp.price||""),
      level:sp.level||"", size:sp.size||"", wb:sp.wb||""
    });
  });
  // 按当月销量排名
  allDataCache.sort(function(a,b){ return b.sales - a.sales; });
  allDataCache.forEach(function(d,i){ d.rank = i + 1; });
}

function renderAllData() {
  var fc = document.getElementById("fltCat").value;
  var fm = document.getElementById("fltMaker").value;
  var fb = document.getElementById("fltBrand").value;
  var fn = document.getElementById("fltNation").value;
  var fp = document.getElementById("fltPrice").value;
  var fs = document.getElementById("fltSearch").value.toLowerCase();

  var filtered = allDataCache.filter(function(d){
    if (fc && d.cat !== fc) return false;
    if (fm && d.maker !== fm) return false;
    if (fb && d.brand !== fb) return false;
    if (fn && d.nation !== fn) return false;
    if (fp && d.priceRange !== fp) return false;
    if (fs) {
      var hay = (d.brand+d.model+d.maker).toLowerCase();
      if (hay.indexOf(fs) < 0) return false;
    }
    return true;
  });

  // 排序
  filtered.sort(function(a,b){
    var va = a[allSortKey], vb = b[allSortKey];
    if (typeof va === "string") {
      va = parsePct(va) || 0; vb = parsePct(vb) || 0;
    }
    return allSortAsc ? va - vb : vb - va;
  });

  // 分页
  var total = filtered.length;
  var pages = Math.ceil(total / allPageSize) || 1;
  if (allPage > pages) allPage = pages;
  var start = (allPage - 1) * allPageSize;
  var pageData = filtered.slice(start, start + allPageSize);

  document.getElementById("allCount").textContent = "共 " + total + " 条记录";

  var tb = document.querySelector("#tblAll tbody");
  tb.innerHTML = pageData.map(function(d){
    return '<tr><td class="'+rankClass(d.rank)+'">'+d.rank+'</td><td>'+d.maker+'</td><td class="brand-cell">'+d.brand+'</td><td>'+d.model+'</td><td>'+d.cat+'</td><td>'+d.nation+'</td><td class="num">'+fmtNum(d.sales)+'</td><td class="num">'+fmtNum(d.ytd)+'</td><td class="num">'+fmtNum(d.lastMonth)+'</td><td class="num '+pctClass(d.mom)+'">'+d.mom+'</td><td class="num">'+fmtNum(d.lastYear)+'</td><td class="num '+pctClass(d.yoy)+'">'+d.yoy+'</td><td>'+(d.power||"--")+'</td><td class="num">'+(d.price?d.price+"万":"--")+'</td><td>'+(d.priceRange||"--")+'</td><td>'+(d.level||"--")+'</td><td>'+(d.size||"--")+'</td><td class="num">'+(d.wb||"--")+'</td></tr>';
  }).join("");

  // 分页控件
  document.getElementById("pageInfo").textContent = "第 "+allPage+"/"+pages+" 页";
  var btnsHtml = "";
  for (var i = 1; i <= pages; i++) {
    if (pages <= 7 || Math.abs(i - allPage) <= 2 || i === 1 || i === pages) {
      btnsHtml += '<button class="page-btn'+(i===allPage?" active":"")+'" onclick="allPage='+i+';renderAllData()">'+i+'</button>';
    } else if (btnsHtml.slice(-3) !== "...") {
      btnsHtml += "...";
    }
  }
  document.getElementById("pageBtns").innerHTML = btnsHtml;
}

// 表头排序
document.querySelectorAll("#tblAll th[data-sort]").forEach(function(th){
  th.addEventListener("click", function(){
    var key = th.dataset.sort;
    if (allSortKey === key) allSortAsc = !allSortAsc;
    else { allSortKey = key; allSortAsc = false; }
    allPage = 1;
    renderAllData();
  });
});

// ==================== CSV导出 ====================
function exportCSV() {
  var headers = ["排名","车企","品牌","车型","类别","系别","1月销量","本年累计","12月销量","环比","去年同期","同比","动力类型","指导价(万)","价格区间","级别","尺寸(mm)","轴距(mm)"];
  var rows = [headers.join(",")];
  allDataCache.forEach(function(d){
    rows.push([d.rank,d.maker,d.brand,d.model,d.cat,d.nation,d.sales,d.ytd,d.lastMonth,d.mom,d.lastYear,d.yoy,d.power,d.price,d.priceRange,d.level,d.size,d.wb].join(","));
  });
  var blob = new Blob(["\uFEFF"+rows.join("\n")], {type:"text/csv;charset=utf-8;"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "汽车销量数据_2026年1月.csv";
  a.click();
}

(function(){

  var brandList = Object.keys(brands).sort(function(a,b){ return brands[b]-brands[a]; });
  var selMaker = document.getElementById("fltMaker");
  makerList.forEach(function(m){ var o=document.createElement("option"); o.value=m; o.textContent=m; selMaker.appendChild(o); });
  var selBrand = document.getElementById("fltBrand");
  brandList.forEach(function(b){ var o=document.createElement("option"); o.value=b; o.textContent=b; selBrand.appendChild(o); });
})();
